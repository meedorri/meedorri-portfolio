<!DOCTYPE html>
<html lang="ko" style="background:#ffffff;color:#000000;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>미도리작업실</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar: 200px;
      --line: #e0e0e0;
    }

    html {
      color-scheme: light;
    }

    html, body {
      height: 100%;
      background-color: #ffffff;
      color: #000000;
      font-family: 'Inter', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      font-weight: 500;
      -webkit-font-smoothing: auto;
    }

    /* ─── LAYOUT ─── */
    #layout {
      display: flex;
      height: 100vh;
      background-color: #ffffff;
    }

    /* ─── SIDEBAR ─── */
    #sidebar {
      width: var(--sidebar);
      min-width: var(--sidebar);
      height: 100vh;
      position: sticky;
      top: 0;
      display: flex;
      flex-direction: column;
      padding: 28px 24px 24px;
      border-right: 1px solid var(--line);
      overflow: hidden;
      background-color: #ffffff;
      z-index: 10;
    }

    .sidebar-brand { margin-bottom: 24px; }

    .sidebar-section {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    .sidebar-section-title {
      font-size: 10.5px;
      font-weight: 500;
      color: #000000;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    .brand-name {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.5;
      display: block;
      color: #000000;
    }

    .brand-tagline {
      font-size: 10px;
      color: #000000;
      display: block;
      margin-top: 2px;
      font-weight: 500;
    }

    .project-nav {
      display: flex;
      flex-direction: column;
    }

    .nav-item {
      font-size: 10.5px;
      font-weight: 500;
      line-height: 1;
      padding: 5px 0;
      padding-left: 10px;
      cursor: pointer;
      color: #000000;
      border: none;
      background: none;
      text-align: left;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .sidebar-links {
      display: flex;
      flex-direction: column;
    }

    .sidebar-link {
      font-size: 10.5px;
      color: #000000;
      padding: 4px 0;
      transition: opacity 0.15s;
      text-decoration: none;
    }

    .sidebar-link:hover { opacity: 0.5; }

    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-footer {
      margin-top: 12px;
      font-size: 9.5px;
      color: #000000;
    }

    /* ─── CONTENT ─── */
    #content {
      flex: 1;
      overflow: hidden;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
    }

    .image-grid {
      display: flex;
      gap: 12px;
      padding: 20px;
      flex: 1;
      background-color: #ffffff;
    }

    .project-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      min-width: 0;
    }


    .col-label {
      font-size: 10px;
      color: #000000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
      letter-spacing: 0.01em;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .col-img-wrap {
      flex: 1;
      overflow: hidden;
      border-radius: 3px;
      background-color: #eeeeee;
    }

    .col-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── DETAIL OVERLAY ─── */
    #detail-overlay {
      position: fixed;
      top: 0;
      left: var(--sidebar);
      right: 0;
      bottom: 0;
      z-index: 100;
      display: flex;
      background-color: #ffffff;
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      visibility: hidden;
      border-left: 1px solid var(--line);
    }

    #detail-overlay.active {
      transform: translateX(0);
      visibility: visible;
    }

    /* Gallery */
    .detail-gallery {
      flex: 1;
      overflow-y: auto;
      background-color: #ffffff;
    }

    .detail-gallery::-webkit-scrollbar { width: 3px; }
    .detail-gallery::-webkit-scrollbar-thumb { background: #cccccc; }

    .dg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 20px 20px 48px;
      background-color: #ffffff;
    }

    .dg-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      border-radius: 2px;
    }

    .dg-grid img.hero {
      grid-column: span 2;
      aspect-ratio: 16/9;
    }

    .gallery-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cccccc;
      font-size: 11px;
    }

    /* ─── INFO PANEL ─── */
    .detail-info {
      width: 310px;
      min-width: 310px;
      border-left: 1px solid var(--line);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
    }

    .detail-info::-webkit-scrollbar { width: 3px; }
    .detail-info::-webkit-scrollbar-thumb { background: #cccccc; }

    .info-topbar {
      display: flex;
      justify-content: flex-end;
      padding: 18px 20px 0;
    }

    .info-close {
      background: none;
      border: none;
      cursor: pointer;
      color: #000000;
      font-size: 10px;
      font-family: inherit;
      letter-spacing: 0.04em;
      padding: 0;
      transition: opacity 0.15s;
    }

    .info-close:hover { opacity: 0.4; }

    .info-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }

    .info-section:first-of-type {
      margin-top: 16px;
      border-top: 1px solid var(--line);
    }

    .info-lbl {
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000000;
      margin-bottom: 8px;
    }

    .info-title {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.35;
      color: #000000;
      letter-spacing: 0.01em;
    }

    .info-sub {
      font-size: 10px;
      color: #000000;
      margin-top: 5px;
      letter-spacing: 0.01em;
    }

    .info-desc {
      font-size: 11px;
      line-height: 1.95;
      color: #000000;
      letter-spacing: 0.01em;
    }

    .info-meta-table {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info-meta-row {
      display: flex;
      gap: 10px;
      font-size: 10.5px;
      color: #000000;
    }

    .mk { min-width: 38px; flex-shrink: 0; }

    .info-spacer { flex: 1; min-height: 20px; }

    .info-foot {
      padding: 16px 20px;
      font-size: 9.5px;
      color: #000000;
    }
  </style>
</head>
<body style="background:#ffffff;color:#000000;">

<div id="layout">
  <aside id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-name">meedorri</span>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Project</div>
      <nav class="project-nav" id="project-nav"></nav>
    </div>

    <div class="sidebar-bottom">
      <div class="sidebar-section-title">Information</div>
      <a class="sidebar-link" href="mailto:mdrlife22@gmail.com">Email</a>
      <a class="sidebar-link" href="#" target="_blank">Instagram</a>
      <div class="sidebar-footer">All Rights Reserved © 2025</div>
    </div>
  </aside>

  <main id="content">
    <div class="image-grid" id="image-grid"></div>
  </main>
</div>

<div id="detail-overlay" aria-hidden="true">
  <div class="detail-gallery" id="detail-gallery"></div>
  <div class="detail-info" id="detail-info"></div>
</div>

<script>
const PROJECTS = [
  {
    id:'29CM 해피미타임',
    title:'29CM 해피미타임',
    category:'Product Design / Photography',
    year:'2024',
    description:`'Happy me time'이라는 문구를 담은 후드 티셔츠와 토마토 고양이 키링을 만들고, 잔디밭과 벤치 위에서 화보를 직접 연출하고 촬영하였습니다. 줄무늬 후드와 무지 후드, 도트 패턴 스커트를 함께 매치하여 하나의 룩을 완성했습니다.

바쁜 하루 속에서도 온전히 나에게 집중하는 시간을 소중히 여기는 태도를 담아 촬영에 임했습니다. 웃음, 눈을 감고 바람을 느끼는 순간처럼 꾸미지 않은 표정을 그대로 담아, 혼자만의 시간이 주는 편안한 감각을 표현하였습니다.`,
    meta:[
      ['분류','제품 디자인 / 화보 촬영'],
      ['연도','2026'],
      ['역할','콘셉트 기획, 로케이션 헌팅, 촬영, 보정']
    ],
    gridImages:[
      '29CM 해피미타임/DSCF0345.jpg'
    ],
    allImages:[
      '29CM 해피미타임/DSCF0345.jpg',
      '29CM 해피미타임/DSCF0806.jpg',
      '29CM 해피미타임/DSCF0225.jpg',
      '29CM 해피미타임/DSCF0580.jpg',
      '29CM 해피미타임/DSCF0609.jpg',
      '29CM 해피미타임/DSCF0755.jpg',
      '29CM 해피미타임/DSCF9837.jpg',
      '29CM 해피미타임/DSCF9994.jpg',
      '29CM 해피미타임/DSCF0796.jpg'
    ]
  },
  {
    id:'시원스쿨',
    title:'시원스쿨',
    category:'Character Illustration / Product Design / Photography',
    year:'2023',
    description:`시원스쿨 랩의 마스코트 캐릭터를 활용해 열두 달의 데스크 캘린더를 디자인하고 촬영하였습니다. 수박과 선풍기가 놓인 한여름부터, 헤드폰을 쓴 토마토 캐릭터가 책과 함께 앉아 있는 가을, 크리스마스트리 아래 옹기종기 모인 겨울까지 계절마다 다른 장면으로 캐릭터를 그려 넣었습니다.

매일 펼쳐보는 물건인 만큼, 공부하는 시간에도 작은 웃음을 심어두고 싶었습니다. 토마토 얼굴의 캐릭터가 계절마다 다른 표정과 소품으로 등장하며, 배움의 과정을 유쾌한 리듬으로 바꿔주기를 바라는 마음을 담았습니다.`,
    meta:[
      ['분류','캐릭터 일러스트 / 캘린더 디자인'],
      ['연도','2023'],
      ['역할','캐릭터 일러스트, 캘린더 디자인, 제품 촬영']
    ],
    gridImages:[
      '시원스쿨/DSCF1067.jpg'
    ],
    allImages:[
      '시원스쿨/DSCF1067.jpg',
      '시원스쿨/DSCF1070.jpg',
      '시원스쿨/DSCF1073.jpg',
      '시원스쿨/DSCF1064.jpg',
      '시원스쿨/DSCF1066.jpg',
      '시원스쿨/DSCF1058.jpg',
      '시원스쿨/DSCF1104.jpg',
      '시원스쿨/DSCF1059.jpg',
      '시원스쿨/DSCF1071.jpg'
    ]
  },
  {
    id:'화사',
    title:'HWASA X 미도리작업실',
    category:'Character Design / Goods / Photography',
    year:'2024',
    description:`가수 화사와의 협업으로 토마토를 모티프로 한 캐릭터 키링과 스티커를 디자인하고 촬영하였습니다. 초록빛 꼭지를 쓴 붉은 토마토 얼굴에 고양이 수염과 하트 볼터치를 더해, 상큼하면서도 사랑스러운 표정을 담았습니다.

'귀여움은 모든 것을 이긴다'는 문장을 왕관과 색색의 하트로 둘러싸 스티커에 새겼습니다. 낡은 창틀과 나뭇결 벽 위에 굿즈를 놓고 촬영하여, 화려한 캐릭터가 일상의 질감 속에서도 자연스럽게 스며드는 순간을 연출하였습니다.`,
    meta:[
      ['분류','캐릭터 디자인 / 굿즈 / 촬영'],
      ['연도','2024'],
      ['역할','캐릭터 디자인, 굿즈 제작, 촬영']
    ],
    gridImages:[
      '화사/DSCF2624.jpg'
    ],
    allImages:[
      '화사/DSCF2624.jpg',
      '화사/DSCF2625.jpg',
      '화사/DSCF2619.jpg',
      '화사/DSCF2552.jpg',
      '화사/DSCF2545.jpg',
      '화사/Frame 3.png',
      '화사/IMG_6288.jpg',
      '화사/DSCF2626.jpg',
      '화사/DSCF2590.jpg'
    ]
  }
];

// ── Build sidebar nav ──
const navEl = document.getElementById('project-nav');
PROJECTS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'nav-item';
  btn.textContent = p.title;
  btn.dataset.id = p.id;
  btn.addEventListener('click', () => openProject(p));
  navEl.appendChild(btn);
});

// ── Build image grid (3-col, 1 image per project) ──
const gridEl = document.getElementById('image-grid');
PROJECTS.forEach(p => {
  const col = document.createElement('div');
  col.className = 'project-col';
  col.dataset.pid = p.id;

  const label = document.createElement('div');
  label.className = 'col-label';
  label.innerHTML = `<span>${p.title}</span><span>↗</span>`;

  const wrap = document.createElement('div');
  wrap.className = 'col-img-wrap';

  const img = document.createElement('img');
  img.src = p.gridImages[0];
  img.alt = p.title;
  img.className = 'col-img';
  img.loading = 'eager';

  wrap.appendChild(img);
  col.appendChild(label);
  col.appendChild(wrap);
  col.addEventListener('click', () => openProject(p));
  gridEl.appendChild(col);
});


// ── Open project ──
function openProject(p) {
  document.querySelectorAll('.nav-item').forEach(b =>
    b.classList.toggle('active', b.dataset.id === p.id)
  );

  const gallery = document.getElementById('detail-gallery');
  gallery.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'dg-grid';
  p.allImages.forEach((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = p.title;
    img.loading = i < 2 ? 'eager' : 'lazy';
    if (i === 0) img.classList.add('hero');
    grid.appendChild(img);
  });
  gallery.appendChild(grid);

  const info = document.getElementById('detail-info');
  const descHtml = p.description
    .split(/\n\n/)
    .map(para => `<p style="margin-bottom:12px">${para.trim()}</p>`)
    .join('');

  info.innerHTML = `
    <div class="info-topbar">
      <button class="info-close" id="close-btn">닫기 ✕</button>
    </div>
    <div class="info-section">
      <div class="info-lbl">Project</div>
      <div class="info-title">${p.title}</div>
      <div class="info-sub">${p.year} · ${p.category}</div>
    </div>
    <div class="info-section">
      <div class="info-lbl">Overview</div>
      <div class="info-desc">${descHtml}</div>
    </div>
    <div class="info-section">
      <div class="info-lbl">Details</div>
      <div class="info-meta-table">
        ${p.meta.map(([k, v]) => `
          <div class="info-meta-row">
            <span class="mk">${k}</span>
            <span>${v}</span>
          </div>`).join('')}
      </div>
    </div>
    <div class="info-spacer"></div>
    <div class="info-foot">미도리작업실 · Seoul</div>
  `;

  document.getElementById('close-btn').addEventListener('click', closeProject);
  document.getElementById('detail-overlay').classList.add('active');
  document.getElementById('detail-overlay').setAttribute('aria-hidden', 'false');
}

function closeProject() {
  document.getElementById('detail-overlay').classList.remove('active');
  document.getElementById('detail-overlay').setAttribute('aria-hidden', 'true');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeProject(); });
</script>
</body>
</html>
