<!DOCTYPE html>
<html lang="ko" style="background:#ffffff;color:#000000;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>미도리작업실</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar: 200px;
      --line: #e0e0e0;
    }

    html {
      color-scheme: light;
    }

    html, body {
      height: 100%;
      background-color: #ffffff;
      color: #000000;
      font-family: 'Inter', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      font-weight: 500;
      -webkit-font-smoothing: auto;
    }

    /* ─── LAYOUT ─── */
    #layout {
      display: flex;
      height: 100vh;
      background-color: #ffffff;
    }

    /* ─── SIDEBAR ─── */
    #sidebar {
      width: var(--sidebar);
      min-width: var(--sidebar);
      height: 100vh;
      position: sticky;
      top: 0;
      display: flex;
      flex-direction: column;
      padding: 28px 24px 24px;
      border-right: 1px solid var(--line);
      overflow: hidden;
      background-color: #ffffff;
      z-index: 10;
    }

    .sidebar-brand { margin-bottom: 24px; }

    .sidebar-section {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    .sidebar-section-title {
      font-size: 10.5px;
      font-weight: 500;
      color: #000000;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    .brand-name {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.5;
      display: block;
      color: #000000;
    }

    .brand-tagline {
      font-size: 10px;
      color: #000000;
      display: block;
      margin-top: 2px;
      font-weight: 500;
    }

    .project-nav {
      display: flex;
      flex-direction: column;
    }

    .nav-item {
      font-size: 10.5px;
      font-weight: 500;
      line-height: 1;
      padding: 5px 0;
      padding-left: 10px;
      cursor: pointer;
      color: #000000;
      border: none;
      background: none;
      text-align: left;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .sidebar-links {
      display: flex;
      flex-direction: column;
    }

    .sidebar-link {
      font-size: 10.5px;
      color: #000000;
      padding: 4px 0;
      transition: opacity 0.15s;
      text-decoration: none;
    }

    .sidebar-link:hover { opacity: 0.5; }

    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-footer {
      margin-top: 12px;
      font-size: 9.5px;
      color: #000000;
    }

    /* ─── CONTENT ─── */
    #content {
      flex: 1;
      overflow: hidden;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
    }

    .image-grid {
      display: flex;
      gap: 12px;
      padding: 20px;
      flex: 1;
      background-color: #ffffff;
    }

    .project-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      min-width: 0;
    }


    .col-label {
      font-size: 10px;
      color: #000000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
      letter-spacing: 0.01em;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .col-img-wrap {
      flex: 1;
      overflow: hidden;
      border-radius: 3px;
      background-color: #eeeeee;
    }

    .col-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── DETAIL OVERLAY ─── */
    #detail-overlay {
      position: fixed;
      top: 0;
      left: var(--sidebar);
      right: 0;
      bottom: 0;
      z-index: 100;
      display: flex;
      background-color: #ffffff;
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      visibility: hidden;
      border-left: 1px solid var(--line);
    }

    #detail-overlay.active {
      transform: translateX(0);
      visibility: visible;
    }

    /* Gallery */
    .detail-gallery {
      flex: 1;
      overflow-y: auto;
      background-color: #ffffff;
    }

    .detail-gallery::-webkit-scrollbar { width: 3px; }
    .detail-gallery::-webkit-scrollbar-thumb { background: #cccccc; }

    .dg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 20px 20px 48px;
      background-color: #ffffff;
    }

    .dg-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      border-radius: 2px;
    }

    .dg-grid img.hero {
      grid-column: span 2;
      aspect-ratio: 16/9;
    }

    .gallery-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cccccc;
      font-size: 11px;
    }

    /* ─── INFO PANEL ─── */
    .detail-info {
      width: 310px;
      min-width: 310px;
      border-left: 1px solid var(--line);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
    }

    .detail-info::-webkit-scrollbar { width: 3px; }
    .detail-info::-webkit-scrollbar-thumb { background: #cccccc; }

    .info-topbar {
      display: flex;
      justify-content: flex-end;
      padding: 18px 20px 0;
    }

    .info-close {
      background: none;
      border: none;
      cursor: pointer;
      color: #000000;
      font-size: 10px;
      font-family: inherit;
      letter-spacing: 0.04em;
      padding: 0;
      transition: opacity 0.15s;
    }

    .info-close:hover { opacity: 0.4; }

    .info-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }

    .info-section:first-of-type {
      margin-top: 16px;
      border-top: 1px solid var(--line);
    }

    .info-lbl {
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000000;
      margin-bottom: 8px;
    }

    .info-title {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.35;
      color: #000000;
      letter-spacing: 0.01em;
    }

    .info-sub {
      font-size: 10px;
      color: #000000;
      margin-top: 5px;
      letter-spacing: 0.01em;
    }

    .info-desc {
      font-size: 11px;
      line-height: 1.95;
      color: #000000;
      letter-spacing: 0.01em;
    }

    .info-meta-table {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info-meta-row {
      display: flex;
      gap: 10px;
      font-size: 10.5px;
      color: #000000;
    }

    .mk { min-width: 38px; flex-shrink: 0; }

    .info-spacer { flex: 1; min-height: 20px; }

    .info-foot {
      padding: 16px 20px;
      font-size: 9.5px;
      color: #000000;
    }
  </style>
</head>
<body style="background:#ffffff;color:#000000;">

<div id="layout">
  <aside id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-name">meedorri</span>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Project</div>
      <nav class="project-nav" id="project-nav"></nav>
    </div>

    <div class="sidebar-bottom">
      <div class="sidebar-section-title">Information</div>
      <a class="sidebar-link" href="mailto:mdrlife22@gmail.com">Email</a>
      <a class="sidebar-link" href="#" target="_blank">Instagram</a>
      <div class="sidebar-footer">All Rights Reserved © 2025</div>
    </div>
  </aside>

  <main id="content">
    <div class="image-grid" id="image-grid"></div>
  </main>
</div>

<div id="detail-overlay" aria-hidden="true">
  <div class="detail-gallery" id="detail-gallery"></div>
  <div class="detail-info" id="detail-info"></div>
</div>

<script>
const PROJECTS = [
  {
    id:'29CM 해피미타임',
    title:'29CM 해피미타임',
    category:'Product Design / Photography',
    year:'2023',
    description:`미도리작업실은 29CM와 협업하여 'Happy me time'이라는 이름의 컬렉션을 선보이게 되었습니다. 각자의 하루 끝에서 자신만의 시간을 지키는 사람들을 위한 옷과 소품을 만들어달라는 제안에서 이번 프로젝트가 시작되었습니다.

스트라이프 후드와 도트 무늬 톱, 그리고 토마토 얼굴을 한 캐릭터 키링을 디자인하고 촬영하였습니다. 공원의 잔디와 벤치 위에서 자연광으로 담아내며, 혼자 있는 시간을 소중히 여기는 태도를 표현했습니다.`,
    meta:[
      ['분류','패션 잡화 / 화보 촬영'],
      ['연도','2023'],
      ['역할','굿즈 디자인 및 화보 촬영']
    ],
    gridImages:[
      '29CM 해피미타임/DSCF0345.jpg'
    ],
    allImages:[
      '29CM 해피미타임/DSCF0345.jpg',
      '29CM 해피미타임/DSCF0806.jpg',
      '29CM 해피미타임/DSCF0225.jpg',
      '29CM 해피미타임/DSCF0580.jpg',
      '29CM 해피미타임/DSCF0609.jpg',
      '29CM 해피미타임/DSCF0755.jpg',
      '29CM 해피미타임/DSCF9837.jpg',
      '29CM 해피미타임/DSCF9994.jpg',
      '29CM 해피미타임/DSCF0796.jpg'
    ]
  },
  {
    id:'시원스쿨',
    title:'시원스쿨랩 X 미도리작업실',
    category:'Character Illustration / Product Design / Photography',
    year:'2026',
    description:`시원스쿨랩으로부터 2026년도 데스크 캘린더 제작을 의뢰받으며 프로젝트가 시작되었습니다. 매일 책상 위에 놓여 학습 시간을 함께 채우는 물건인 만큼, 열두 달 내내 펼쳐볼 때마다 마주치는 표지 이상의 무언가가 필요하다는 요청이 있었습니다. 미도리작업실은 이 캘린더가 단순히 날짜를 확인하는 도구가 아니라, 공부하는 사람의 하루 옆에 앉아 있는 작은 동료가 되어야 한다고 이해하고 작업에 들어갔습니다.

미도리작업실은 시원스쿨랩의 토마토 캐릭터와 개구리, LAB 소녀 캐릭터를 중심에 두고, 계절마다 다른 장면을 그려 넣는 방식으로 접근했습니다. 수박을 안고 선풍기 바람을 쐬는 한여름, 우산을 쓰고 장맛비를 맞는 유월, 헤드폰을 낀 토마토가 교재를 곁에 둔 채 몰입하는 가을, 눈사람이 되어 서로를 바라보는 겨울까지 열두 달 각각에 계절의 온도를 입혔습니다. '오늘부터 진짜 달라질게요' 같은 캐릭터의 다짐도 소품 곳곳에 새겨, 공부하는 마음을 유머러스하게 대변하고자 했습니다.

완성된 캘린더는 실제 책상과 책장 사이에서 촬영하며 사용자의 일상 속 자리를 그대로 담아냈습니다. 매일 한 장씩 넘기는 사람에게 오늘의 다짐을 다시 확인시켜주는 물건이 되기를 바라는 마음으로 마무리한 작업이었고, 딱딱한 학습의 시간에도 작은 웃음이 스며들 수 있다는 감각을 시원스쿨랩과 함께 확인한 프로젝트로 남았습니다.`,
    meta:[
      ['분류','캐릭터 일러스트 / 캘린더 디자인'],
      ['연도','2026'],
      ['역할','캐릭터 일러스트, 캘린더 디자인, 제품 촬영']
    ],
    gridImages:[
      '시원스쿨/DSCF1067.jpg'
    ],
    allImages:[
      '시원스쿨/DSCF1067.jpg',
      '시원스쿨/DSCF1070.jpg',
      '시원스쿨/DSCF1073.jpg',
      '시원스쿨/DSCF1064.jpg',
      '시원스쿨/DSCF1066.jpg',
      '시원스쿨/DSCF1058.jpg',
      '시원스쿨/DSCF1104.jpg',
      '시원스쿨/DSCF1059.jpg',
      '시원스쿨/DSCF1071.jpg'
    ]
  },
  {
    id:'화사',
    title:'HWASA X 미도리작업실',
    category:'Character Design / Goods / Photography',
    year:'2024',
    description:`가수 화사와의 협업으로 토마토를 모티프로 한 캐릭터 키링과 스티커를 디자인하고 촬영하였습니다. 초록빛 꼭지를 쓴 붉은 토마토 얼굴에 고양이 수염과 하트 볼터치를 더해, 상큼하면서도 사랑스러운 표정을 담았습니다.

'귀여움은 모든 것을 이긴다'는 문장을 왕관과 색색의 하트로 둘러싸 스티커에 새겼습니다. 낡은 창틀과 나뭇결 벽 위에 굿즈를 놓고 촬영하여, 화려한 캐릭터가 일상의 질감 속에서도 자연스럽게 스며드는 순간을 연출하였습니다.`,
    meta:[
      ['분류','캐릭터 디자인 / 굿즈 / 촬영'],
      ['연도','2024'],
      ['역할','캐릭터 디자인, 굿즈 제작, 촬영']
    ],
    gridImages:[
      '화사/DSCF2624.jpg'
    ],
    allImages:[
      '화사/DSCF2624.jpg',
      '화사/DSCF2625.jpg',
      '화사/DSCF2619.jpg',
      '화사/DSCF2552.jpg',
      '화사/DSCF2545.jpg',
      '화사/Frame 3.png',
      '화사/IMG_6288.jpg',
      '화사/DSCF2626.jpg',
      '화사/DSCF2590.jpg'
    ]
  }
];

// ── Build sidebar nav ──
const navEl = document.getElementById('project-nav');
PROJECTS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'nav-item';
  btn.textContent = p.title;
  btn.dataset.id = p.id;
  btn.addEventListener('click', () => openProject(p));
  navEl.appendChild(btn);
});

// ── Build image grid (3-col, 1 image per project) ──
const gridEl = document.getElementById('image-grid');
PROJECTS.forEach(p => {
  const col = document.createElement('div');
  col.className = 'project-col';
  col.dataset.pid = p.id;

  const label = document.createElement('div');
  label.className = 'col-label';
  label.innerHTML = `<span>${p.title}</span><span>↗</span>`;

  const wrap = document.createElement('div');
  wrap.className = 'col-img-wrap';

  const img = document.createElement('img');
  img.src = p.gridImages[0];
  img.alt = p.title;
  img.className = 'col-img';
  img.loading = 'eager';

  wrap.appendChild(img);
  col.appendChild(label);
  col.appendChild(wrap);
  col.addEventListener('click', () => openProject(p));
  gridEl.appendChild(col);
});


// ── Open project ──
function openProject(p) {
  document.querySelectorAll('.nav-item').forEach(b =>
    b.classList.toggle('active', b.dataset.id === p.id)
  );

  const gallery = document.getElementById('detail-gallery');
  gallery.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'dg-grid';
  p.allImages.forEach((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = p.title;
    img.loading = i < 2 ? 'eager' : 'lazy';
    if (i === 0) img.classList.add('hero');
    grid.appendChild(img);
  });
  gallery.appendChild(grid);

  const info = document.getElementById('detail-info');
  const descHtml = p.description
    .split(/\n\n/)
    .map(para => `<p style="margin-bottom:12px">${para.trim()}</p>`)
    .join('');

  info.innerHTML = `
    <div class="info-topbar">
      <button class="info-close" id="close-btn">닫기 ✕</button>
    </div>
    <div class="info-section">
      <div class="info-lbl">Project</div>
      <div class="info-title">${p.title}</div>
      <div class="info-sub">${p.year} · ${p.category}</div>
    </div>
    <div class="info-section">
      <div class="info-lbl">Overview</div>
      <div class="info-desc">${descHtml}</div>
    </div>
    <div class="info-section">
      <div class="info-lbl">Details</div>
      <div class="info-meta-table">
        ${p.meta.map(([k, v]) => `
          <div class="info-meta-row">
            <span class="mk">${k}</span>
            <span>${v}</span>
          </div>`).join('')}
      </div>
    </div>
    <div class="info-spacer"></div>
    <div class="info-foot">미도리작업실 · Seoul</div>
  `;

  document.getElementById('close-btn').addEventListener('click', closeProject);
  document.getElementById('detail-overlay').classList.add('active');
  document.getElementById('detail-overlay').setAttribute('aria-hidden', 'false');
}

function closeProject() {
  document.getElementById('detail-overlay').classList.remove('active');
  document.getElementById('detail-overlay').setAttribute('aria-hidden', 'true');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeProject(); });
</script>
</body>
</html>
