<!DOCTYPE html>
<html lang="ko" style="background:#fff">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<title>meedorri — Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#fff;color:#000;font-family:'Inter','Apple SD Gothic Neo',sans-serif;font-size:12px;-webkit-font-smoothing:auto}

/* ── layout ── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── left ── */
#left{width:200px;min-width:200px;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;padding:24px 20px;overflow:hidden}
.brand{font-size:12px;font-weight:600;margin-bottom:2px}
.brand-sub{font-size:10px;color:#888;margin-bottom:20px}
.sec-title{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:8px}

#proj-list{flex:1;overflow-y:auto}
.proj-item{padding:6px 0;font-size:11px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:6px}
.proj-item:hover{opacity:.6}
.proj-item.active{font-weight:600}
.proj-dot{width:5px;height:5px;border-radius:50%;background:#ddd;flex-shrink:0}
.proj-dot.pub{background:#2a7a2a}
.proj-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* upcoming */
.upcoming-wrap{border-top:1px solid #e0e0e0;padding-top:14px;margin-top:14px;flex-shrink:0}
#upcoming-list{margin:8px 0 6px;max-height:130px;overflow-y:auto}
.u-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #f0f0f0}
.u-item:last-child{border-bottom:none}
.u-dot{width:5px;height:5px;border-radius:50%;background:#000;flex-shrink:0;cursor:pointer}
.u-item.done .u-dot{background:#ccc}
.u-item.done .u-text{text-decoration:line-through;color:#bbb}
.u-text{flex:1;font-size:10.5px;line-height:1.4;word-break:break-all}
.u-del{background:none;border:none;color:#ccc;font-size:13px;cursor:pointer;padding:0;visibility:hidden}
.u-item:hover .u-del{visibility:visible}
.u-del:hover{color:#000}
.u-input-row{display:flex;gap:6px;margin-top:4px;align-items:center}
#u-input{flex:1;border:none;border-bottom:1px solid #e0e0e0;padding:4px 0;font-size:10.5px;font-family:inherit;background:none;color:#000;outline:none}
#u-input:focus{border-color:#000}
#u-input::placeholder{color:#ccc}
.u-add{background:none;border:none;color:#aaa;font-size:16px;cursor:pointer;padding:0;line-height:1}
.u-add:hover{color:#000}

/* left footer */
.left-foot{margin-top:12px}
#open-btn{width:100%;padding:6px 0;background:none;color:#888;border:1px solid #e0e0e0;border-radius:2px;font-size:10px;font-family:inherit;cursor:pointer;margin-bottom:8px}
#open-btn:hover{color:#000;border-color:#000}
#save-btn{width:100%;padding:9px 0;background:#000;color:#fff;border:none;border-radius:2px;font-size:11px;font-family:inherit;cursor:pointer}
#save-btn:hover{opacity:.75}
#save-btn:disabled{opacity:.3;cursor:default}

/* publish button */
.publish-row{margin-bottom:24px}
.publish-btn{width:100%;padding:10px;border-radius:2px;font-size:11px;font-family:inherit;cursor:pointer;border:1px solid #d0d0d0;background:#fff;color:#000}
.publish-btn:hover:not(:disabled){border-color:#000}
.publish-btn.published{background:#2a7a2a;color:#fff;border-color:#2a7a2a}
.publish-btn.published:hover:not(:disabled){opacity:.8}
.publish-btn:disabled{opacity:.5;cursor:default}

/* ── middle ── */
#middle{flex:1;overflow-y:auto;padding:28px;border-right:1px solid #e0e0e0}
.empty-hint{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#ccc}
.empty-hint p{font-size:11px;text-align:center;line-height:1.7}

/* generate button */
.gen-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;background:#000;color:#fff;border:none;border-radius:2px;font-size:11px;font-family:inherit;cursor:pointer;margin-bottom:24px}
.gen-btn:hover:not(:disabled){opacity:.75}
.gen-btn:disabled{opacity:.4;cursor:default}
.gen-btn.loading{background:#555}
.gen-btn.done{background:#2a7a2a}

/* editor sections */
.ed-sec{margin-bottom:26px}
.ed-sec-title{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #e0e0e0}
.field-row{margin-bottom:10px}
.field-label{font-size:10px;color:#888;margin-bottom:4px;display:block}
.field-input{width:100%;padding:7px 10px;border:1px solid #e0e0e0;border-radius:2px;font-size:11.5px;font-family:inherit;background:#fff;color:#000;outline:none}
.field-input:focus{border-color:#000}
textarea.field-input{min-height:88px;resize:vertical;line-height:1.7}

/* meta rows */
.meta-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.meta-key{flex:0 0 80px}
.meta-val{flex:1}
.meta-rm{background:none;border:none;color:#ccc;font-size:15px;cursor:pointer;padding:0 2px}
.meta-rm:hover{color:#000}
.add-meta{font-size:11px;color:#888;background:none;border:none;cursor:pointer;padding:2px 0}
.add-meta:hover{color:#000}

/* thumb */
.thumb-row{display:flex;align-items:center;gap:12px}
.thumb-img{width:72px;height:72px;object-fit:cover;border-radius:2px;border:1px solid #e0e0e0;display:block;flex-shrink:0}
.thumb-empty{width:72px;height:72px;background:#f5f5f5;border-radius:2px;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center;font-size:20px;color:#ccc;flex-shrink:0}
.pick-btn{font-size:11px;padding:7px 14px;background:none;border:1px solid #d0d0d0;border-radius:2px;font-family:inherit;cursor:pointer;color:#000}
.pick-btn:hover{border-color:#000}

/* detail grid */
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.img-cell{aspect-ratio:4/3;border-radius:2px;background:#f0f0f0;overflow:hidden;position:relative;cursor:grab}
.img-cell img{width:100%;height:100%;object-fit:cover;display:block}
.img-cell .rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.img-cell:hover .rm{opacity:1}
.img-cell.dragging{opacity:.35}
.img-cell.drag-over{outline:2px dashed #000;outline-offset:2px}

/* add + pool */
.img-add-bar{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.add-img-btn{font-size:11px;padding:7px 14px;background:#000;color:#fff;border:none;border-radius:2px;cursor:pointer;font-family:inherit}
.add-img-btn:hover{opacity:.75}
.pool-toggle{font-size:11px;color:#888;background:none;border:none;cursor:pointer;padding:0}
.pool-toggle:hover{color:#000}
.img-pool{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;max-height:200px;overflow-y:auto;margin-top:8px}
.pool-cell{aspect-ratio:1;border-radius:2px;background:#f0f0f0;overflow:hidden;cursor:pointer;position:relative}
.pool-cell img{width:100%;height:100%;object-fit:cover;display:block}
.pool-cell.used::after{content:'✓';position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600}

/* ── right: preview ── */
#right{width:380px;min-width:380px;display:flex;flex-direction:column;overflow:hidden}
.preview-bar{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#888;padding:12px 16px;border-bottom:1px solid #e0e0e0;flex-shrink:0}
#preview-pane{flex:1;display:flex;overflow:hidden}
.pv-gallery{flex:1;overflow-y:auto}
.pv-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:12px}
.pv-grid img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;border-radius:2px}
.pv-grid img.hero{grid-column:span 2;aspect-ratio:16/9}
.pv-info{width:158px;min-width:158px;border-left:1px solid #e0e0e0;display:flex;flex-direction:column;overflow-y:auto}
.pv-sec{padding:10px 12px;border-bottom:1px solid #eee}
.pv-lbl{font-size:8px;letter-spacing:.07em;text-transform:uppercase;color:#999;margin-bottom:5px}
.pv-title{font-size:12px;font-weight:600;line-height:1.3}
.pv-sub{font-size:9px;color:#555;margin-top:3px}
.pv-desc{font-size:9.5px;line-height:1.8;color:#222}
.pv-meta-row{display:flex;gap:6px;font-size:9px;margin-bottom:4px}
.pv-mk{color:#888;min-width:28px;flex-shrink:0}
.pv-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px;text-align:center;line-height:1.7}

/* ── init overlay ── */
#init-overlay{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;cursor:pointer;gap:14px}
#init-overlay .io-brand{font-size:13px;font-weight:600}
#init-overlay .io-label{font-size:11px;color:#888}
#init-overlay .io-hint{font-size:10px;color:#ccc;margin-top:6px}
</style>
</head>
<body>
<div id="app">

<!-- left -->
<aside id="left">
  <div class="brand">meedorri</div>
  <div class="brand-sub">Portfolio Builder</div>

  <div class="sec-title">Project</div>
  <div id="proj-list"><div style="font-size:10px;color:#bbb">폴더를 열어주세요</div></div>

  <div class="upcoming-wrap">
    <div class="sec-title">예정 프로젝트</div>
    <div id="upcoming-list"></div>
    <div class="u-input-row">
      <input id="u-input" type="text" placeholder="프로젝트 추가">
      <button class="u-add" id="u-add-btn">＋</button>
    </div>
  </div>

  <div class="left-foot">
    <button id="open-btn">다른 폴더 열기</button>
    <button id="save-btn" disabled>index.html 저장</button>
  </div>
</aside>

<!-- middle -->
<main id="middle">
  <div class="empty-hint" id="empty-hint">
    <div style="font-size:28px;color:#ddd">↑</div>
    <p>폴더를 열고<br>프로젝트를 선택하세요</p>
  </div>
  <div id="editor" style="display:none"></div>
</main>

<!-- right -->
<div id="right">
  <div class="preview-bar">미리보기</div>
  <div id="preview-pane">
    <div class="pv-empty">프로젝트를 선택하면<br>미리보기가 표시됩니다</div>
  </div>
</div>

</div>

<!-- init overlay -->
<div id="init-overlay">
  <div class="io-brand">meedorri</div>
  <div class="io-label">Portfolio Builder</div>
  <div class="io-hint">클릭해서 시작</div>
</div>

<script>
// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
let rootHandle = null;
let projects   = [];
let selectedId = null;
let blobCache  = {};   // relativePath → blobURL
let dragSrc    = null;

// ═══════════════════════════════════════════
//  IndexedDB — folder handle persistence
// ═══════════════════════════════════════════
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('meedorri-builder', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    r.onsuccess = e => res(e.target.result);
    r.onerror   = () => rej(r.error);
  });
}
async function saveHandle(h) {
  try { const db = await openDB(); db.transaction('handles','readwrite').objectStore('handles').put(h,'root'); } catch {}
}
async function loadHandle() {
  try {
    const db = await openDB();
    return await new Promise((res, rej) => {
      const r = db.transaction('handles','readonly').objectStore('handles').get('root');
      r.onsuccess = () => res(r.result);
      r.onerror   = () => rej(r.error);
    });
  } catch { return null; }
}

// ═══════════════════════════════════════════
//  Folder open / scan
// ═══════════════════════════════════════════
async function openFolder(handle) {
  rootHandle = handle;
  await saveHandle(handle);
  await scanRoot();
  document.getElementById('save-btn').disabled = false;
}

async function scanRoot() {
  const SKIP = new Set(['index.html','builder.html','generate_server.py','ai-server.py','start.sh','install.sh','.DS_Store','projects-data.json','상세페이지_조립기.html','정산관리.html']);
  const IMG  = /\.(jpe?g|png|gif|webp)$/i;
  const detected = [];

  for await (const [rawName, handle] of rootHandle.entries()) {
    const name = rawName.normalize('NFC');
    if (handle.kind !== 'directory' || SKIP.has(name) || name.startsWith('.')) continue;
    const imgs = [];
    await collectImages(handle, name, imgs, IMG);
    if (!imgs.length) continue; // 이미지 없는 폴더(노트, 설정 등)는 프로젝트로 취급하지 않음
    detected.push({ id: name, _folderName: name, _folderImages: imgs });
  }

  let saved = [];
  try {
    const jh = await rootHandle.getFileHandle('projects-data.json');
    saved = JSON.parse(await (await jh.getFile()).text());
  } catch {}

  projects = detected.map(d => {
    const s = saved.find(x => x._folderName === d._folderName) || {};
    const validAll = (s.allImages || []).filter(p => d._folderImages.includes(p));
    return {
      id: d.id, _folderName: d._folderName, _folderImages: d._folderImages,
      title:       s.title       || d._folderName,
      year:        s.year        || '2024',
      category:    s.category    || '',
      description: s.description || '',
      meta:        s.meta        || [['분류',''],['연도','2024'],['역할','']],
      gridImage:   (s.gridImage && d._folderImages.includes(s.gridImage)) ? s.gridImage : (d._folderImages[0]||''),
      allImages:   validAll.length ? validAll : d._folderImages.slice(0,9),
      published:   s.published !== undefined ? s.published : true,
    };
  });

  renderProjList();
}

async function collectImages(handle, prefix, results, EXT) {
  for await (const [rawName, fh] of handle.entries()) {
    const name = rawName.normalize('NFC');
    if (name.startsWith('.')) continue;
    if (fh.kind === 'file' && EXT.test(name)) {
      const path = prefix + '/' + name;
      results.push(path);
      if (!blobCache[path]) blobCache[path] = URL.createObjectURL(await fh.getFile());
    } else if (fh.kind === 'directory') {
      await collectImages(fh, prefix+'/'+name, results, EXT);
    }
  }
}

// ═══════════════════════════════════════════
//  Project list
// ═══════════════════════════════════════════
function renderProjList() {
  const el = document.getElementById('proj-list');
  el.innerHTML = '';
  if (!projects.length) { el.innerHTML = '<div style="font-size:10px;color:#bbb">프로젝트 폴더가 없습니다</div>'; return; }
  projects.forEach(p => {
    const d = document.createElement('div');
    d.className = 'proj-item' + (p.id === selectedId ? ' active' : '');
    const dot = document.createElement('span');
    dot.className = 'proj-dot' + (p.published ? ' pub' : '');
    dot.title = p.published ? '공개됨' : '비공개';
    const label = document.createElement('span');
    label.className = 'proj-label';
    label.textContent = p.title;
    d.appendChild(dot); d.appendChild(label);
    d.onclick = () => selectProject(p.id);
    el.appendChild(d);
  });
}

function selectProject(id) {
  selectedId = id;
  renderProjList();
  renderEditor();
  renderPreview();
}

// ═══════════════════════════════════════════
//  Editor
// ═══════════════════════════════════════════
function renderEditor() {
  const p = proj();
  if (!p) return;
  document.getElementById('empty-hint').style.display = 'none';
  const ed = document.getElementById('editor');
  ed.style.display = 'block';

  ed.innerHTML = `
    <button class="gen-btn" id="gen-btn"><span>✦</span><span id="gen-label">Claude로 자동 생성</span></button>

    <div class="publish-row">
      <button class="publish-btn${p.published ? ' published' : ''}" id="publish-btn">${p.published ? '✓ 사이트에 공개됨 — 클릭해서 비공개로' : '사이트에 공개하기'}</button>
    </div>

    <div class="ed-sec">
      <div class="ed-sec-title">기본 정보</div>
      <div class="field-row"><label class="field-label">프로젝트명</label>
        <input class="field-input" id="f-title" value="${esc(p.title)}"></div>
      <div style="display:flex;gap:10px">
        <div class="field-row" style="flex:0 0 90px"><label class="field-label">연도</label>
          <input class="field-input" id="f-year" value="${esc(p.year)}"></div>
        <div class="field-row" style="flex:1"><label class="field-label">카테고리</label>
          <input class="field-input" id="f-category" value="${esc(p.category)}"></div>
      </div>
      <div class="field-row"><label class="field-label">설명</label>
        <textarea class="field-input" id="f-desc">${esc(p.description)}</textarea></div>
    </div>

    <div class="ed-sec">
      <div class="ed-sec-title">세부 정보</div>
      <div id="meta-rows"></div>
      <button class="add-meta" id="add-meta-btn">+ 항목 추가</button>
    </div>

    <div class="ed-sec">
      <div class="ed-sec-title">대표 이미지 — 인트로에 표시</div>
      <div class="thumb-row" id="thumb-row">
        ${p.gridImage && blobCache[p.gridImage]
          ? `<img class="thumb-img" src="${blobCache[p.gridImage]}">`
          : `<div class="thumb-empty">＋</div>`}
        <button class="pick-btn" id="pick-thumb-btn">파일에서 선택</button>
      </div>
    </div>

    <div class="ed-sec">
      <div class="ed-sec-title">상세 이미지 — 드래그로 순서 변경 · ×로 제거</div>
      <div class="img-add-bar">
        <button class="add-img-btn" id="add-img-btn">＋ 파일에서 추가</button>
        <button class="pool-toggle" id="pool-toggle">폴더 전체 보기 ▾</button>
      </div>
      <div class="detail-grid" id="detail-grid"></div>
      <div id="pool-wrap" style="display:none">
        <div style="font-size:9px;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">폴더 전체 이미지</div>
        <div class="img-pool" id="img-pool"></div>
      </div>
    </div>
  `;

  // text bindings
  document.getElementById('f-title').oninput    = e => { p.title       = e.target.value; renderProjList(); renderPreview(); };
  document.getElementById('f-year').oninput     = e => { p.year        = e.target.value; renderPreview(); };
  document.getElementById('f-category').oninput = e => { p.category    = e.target.value; renderPreview(); };
  document.getElementById('f-desc').oninput     = e => { p.description = e.target.value; renderPreview(); };
  document.getElementById('add-meta-btn').onclick = () => { p.meta.push(['','']); renderMetaRows(p); renderPreview(); };

  // generate
  document.getElementById('gen-btn').onclick = () => generateWithClaude(p);

  // publish toggle
  document.getElementById('publish-btn').onclick = () => togglePublish(p);

  // thumb picker
  document.getElementById('pick-thumb-btn').onclick = async () => {
    try {
      const [h] = await window.showOpenFilePicker({ multiple:false, types:[{description:'Image',accept:{'image/*':['.jpg','.jpeg','.png','.webp']}}] });
      const rel = await rootHandle.resolve(h);
      if (!rel) { alert('포트폴리오 폴더 안의 이미지를 선택해주세요.'); return; }
      const path = rel.map(s=>s.normalize('NFC')).join('/');
      if (!blobCache[path]) blobCache[path] = URL.createObjectURL(await h.getFile());
      if (!p._folderImages.includes(path)) p._folderImages.push(path);
      p.gridImage = path;
      const row = document.getElementById('thumb-row');
      const prev = row.querySelector('img,.thumb-empty');
      if (prev) prev.remove();
      const img = document.createElement('img'); img.className='thumb-img'; img.src=blobCache[path];
      row.insertBefore(img, row.firstChild);
      renderPreview();
    } catch(e) { if (e.name!=='AbortError') alert(e.message); }
  };

  // add images picker
  document.getElementById('add-img-btn').onclick = async () => {
    try {
      const handles = await window.showOpenFilePicker({ multiple:true, types:[{description:'Images',accept:{'image/*':['.jpg','.jpeg','.png','.webp']}}] });
      for (const h of handles) {
        const rel = await rootHandle.resolve(h);
        if (!rel) continue;
        const path = rel.map(s=>s.normalize('NFC')).join('/');
        if (!blobCache[path]) blobCache[path] = URL.createObjectURL(await h.getFile());
        if (!p._folderImages.includes(path)) p._folderImages.push(path);
        if (!p.allImages.includes(path)) p.allImages.push(path);
      }
      renderDetailGrid(p); renderImgPool(p); renderPreview();
    } catch(e) { if (e.name!=='AbortError') alert(e.message); }
  };

  // pool toggle
  let poolOpen = false;
  document.getElementById('pool-toggle').onclick = () => {
    poolOpen = !poolOpen;
    document.getElementById('pool-wrap').style.display = poolOpen ? 'block' : 'none';
    document.getElementById('pool-toggle').textContent = poolOpen ? '폴더 전체 숨기기 ▴' : '폴더 전체 보기 ▾';
  };

  renderMetaRows(p);
  renderDetailGrid(p);
  renderImgPool(p);
}

function renderMetaRows(p) {
  const c = document.getElementById('meta-rows');
  c.innerHTML = '';
  p.meta.forEach((row, i) => {
    const d = document.createElement('div'); d.className='meta-row';
    d.innerHTML = `<input class="field-input meta-key" placeholder="항목" value="${esc(row[0])}">
                   <input class="field-input meta-val" placeholder="내용" value="${esc(row[1])}">
                   <button class="meta-rm">×</button>`;
    const [k, v] = d.querySelectorAll('input');
    k.oninput = e => { p.meta[i][0]=e.target.value; renderPreview(); };
    v.oninput = e => { p.meta[i][1]=e.target.value; renderPreview(); };
    d.querySelector('.meta-rm').onclick = () => { p.meta.splice(i,1); renderMetaRows(p); renderPreview(); };
    c.appendChild(d);
  });
}

function renderDetailGrid(p) {
  const grid = document.getElementById('detail-grid');
  grid.innerHTML = '';
  p.allImages.forEach((path, i) => {
    const cell = document.createElement('div'); cell.className='img-cell'; cell.draggable=true;
    const img  = document.createElement('img'); img.src = blobCache[path]||path;
    const rm   = document.createElement('button'); rm.className='rm'; rm.textContent='×';
    rm.onclick = e => { e.stopPropagation(); p.allImages.splice(i,1); renderDetailGrid(p); renderImgPool(p); renderPreview(); };
    cell.appendChild(img); cell.appendChild(rm);
    cell.addEventListener('dragstart', () => { dragSrc=i; setTimeout(()=>cell.classList.add('dragging'),0); });
    cell.addEventListener('dragend',   () => cell.classList.remove('dragging'));
    cell.addEventListener('dragover',  e => { e.preventDefault(); cell.classList.add('drag-over'); });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', e => {
      e.preventDefault(); cell.classList.remove('drag-over');
      if (dragSrc===null||dragSrc===i) return;
      const [m]=p.allImages.splice(dragSrc,1); p.allImages.splice(i,0,m);
      renderDetailGrid(p); renderPreview();
    });
    grid.appendChild(cell);
  });
}

function renderImgPool(p) {
  const c = document.getElementById('img-pool');
  if (!c) return;
  c.innerHTML = '';
  p._folderImages.forEach(path => {
    const used = p.allImages.includes(path);
    const d = document.createElement('div'); d.className='pool-cell'+(used?' used':'');
    const img = document.createElement('img'); img.src=blobCache[path]||path;
    d.appendChild(img);
    d.onclick = () => {
      if (used) p.allImages.splice(p.allImages.indexOf(path),1);
      else p.allImages.push(path);
      renderDetailGrid(p); renderImgPool(p); renderPreview();
    };
    c.appendChild(d);
  });
}

// ═══════════════════════════════════════════
//  Preview
// ═══════════════════════════════════════════
function renderPreview() {
  const p = proj();
  const pane = document.getElementById('preview-pane');
  if (!p) { pane.innerHTML='<div class="pv-empty">프로젝트를 선택하면<br>미리보기가 표시됩니다</div>'; return; }
  const descHtml = (p.description||'').split(/\n\n+/).filter(Boolean)
    .map(t=>`<p style="margin-bottom:7px">${t.trim()}</p>`).join('');
  pane.innerHTML = `
    <div class="pv-gallery"><div class="pv-grid">
      ${p.allImages.map((path,i)=>`<img src="${blobCache[path]||path}" alt="" ${i===0?'class="hero"':''}>`).join('')}
    </div></div>
    <div class="pv-info">
      <div class="pv-sec"><div class="pv-lbl">Project</div>
        <div class="pv-title">${esc(p.title)}</div>
        <div class="pv-sub">${esc(p.year)}${p.category?' · '+esc(p.category):''}</div></div>
      <div class="pv-sec"><div class="pv-lbl">Overview</div>
        <div class="pv-desc">${descHtml||'<span style="color:#ccc">설명을 입력하세요</span>'}</div></div>
      <div class="pv-sec"><div class="pv-lbl">Details</div>
        ${p.meta.map(([k,v])=>`<div class="pv-meta-row"><span class="pv-mk">${esc(k)}</span><span>${esc(v)}</span></div>`).join('')}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  Generate with Claude (local server)
// ═══════════════════════════════════════════
async function generateWithClaude(p) {
  const btn   = document.getElementById('gen-btn');
  const label = document.getElementById('gen-label');
  btn.disabled=true; btn.className='gen-btn loading'; label.textContent='생성 중...';
  const reset = () => { btn.className='gen-btn'; btn.disabled=false; label.textContent='Claude로 자동 생성'; };

  try {
    const resp = await fetch('http://localhost:3301/generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ folderName: p._folderName, images: p.allImages.slice(0,4) })
    });
    if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(e.error||`오류 ${resp.status}`); }
    const r = await resp.json();

    if (r.title)       { p.title=r.title;             document.getElementById('f-title').value=r.title; }
    if (r.category)    { p.category=r.category;        document.getElementById('f-category').value=r.category; }
    if (r.year)        { p.year=r.year;                document.getElementById('f-year').value=r.year; }
    if (r.description) { p.description=r.description;  document.getElementById('f-desc').value=r.description; }
    if (Array.isArray(r.meta)) { p.meta=r.meta; renderMetaRows(p); }
    renderProjList(); renderPreview();
    btn.className='gen-btn done'; label.textContent='✓ 생성 완료';
    setTimeout(reset, 2500);
  } catch(e) {
    reset();
    if (e.message.includes('fetch')||e.message.includes('Failed')||e.message.includes('NetworkError')) {
      alert('서버에 연결할 수 없습니다.\n\n터미널에서 실행하세요:\n  ! cd ~/Desktop/meedorri && ./start.sh');
    } else { alert('생성 오류: '+e.message); }
  }
}

// ═══════════════════════════════════════════
//  Save to index.html
// ═══════════════════════════════════════════
document.getElementById('save-btn').onclick = async () => {
  if (!rootHandle) return;
  try {
    await persistToSite();
    try {
      await pushToGitHub();
      alert('저장 및 사이트 반영 완료!');
    } catch(e) {
      alert('로컬 저장은 완료됐지만 사이트에는 아직 반영되지 않았습니다.\n\n터미널에서 로컬 서버가 켜져있는지 확인하세요:\n  ! cd ~/Desktop/meedorri/포트폴리오 && ./start.sh\n\n오류: '+e.message);
    }
  } catch(e) { alert('저장 오류: '+e.message); }
};

// 로컬 서버(generate_server.py)를 통해 git add/commit/push 실행
async function pushToGitHub() {
  const resp = await fetch('http://localhost:3301/publish', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
  if (!resp.ok) {
    const e = await resp.json().catch(()=>({}));
    throw new Error(e.error || `오류 ${resp.status}`);
  }
  return resp.json();
}

// 프로젝트 데이터 + index.html(공개된 프로젝트만)을 함께 기록
async function persistToSite() {
  const saveData = projects.map(p=>({ _folderName:p._folderName, title:p.title, year:p.year,
    category:p.category, description:p.description, meta:p.meta, gridImage:p.gridImage,
    allImages:p.allImages, published:p.published }));
  const jh = await rootHandle.getFileHandle('projects-data.json',{create:true});
  const jw = await jh.createWritable(); await jw.write(JSON.stringify(saveData,null,2)); await jw.close();

  const ih = await rootHandle.getFileHandle('index.html');
  let html = await (await ih.getFile()).text();
  const match = html.match(/const PROJECTS = \[[\s\S]*?\];/);
  if (!match) throw new Error('index.html에서 PROJECTS를 찾을 수 없습니다.');
  const published = projects.filter(p => p.published);
  html = html.replace(match[0], buildProjectsJs(published));
  const iw = await ih.createWritable(); await iw.write(html); await iw.close();
}

// ═══════════════════════════════════════════
//  Publish toggle
// ═══════════════════════════════════════════
async function togglePublish(p) {
  const btn = document.getElementById('publish-btn');
  const prevPublished = p.published;
  btn.disabled = true;
  p.published = !prevPublished;
  updatePublishBtn(p);
  try {
    await persistToSite();
    renderProjList();
    try {
      await pushToGitHub();
    } catch(e) {
      alert('로컬에는 저장됐지만 사이트에는 아직 반영되지 않았습니다.\n\n터미널에서 로컬 서버가 켜져있는지 확인하세요:\n  ! cd ~/Desktop/meedorri/포트폴리오 && ./start.sh\n\n오류: '+e.message);
    }
  } catch(e) {
    p.published = prevPublished;
    updatePublishBtn(p);
    alert('사이트 업데이트 오류: '+e.message);
  } finally {
    btn.disabled = false;
  }
}

function updatePublishBtn(p) {
  const btn = document.getElementById('publish-btn');
  if (!btn) return;
  btn.classList.toggle('published', p.published);
  btn.textContent = p.published ? '✓ 사이트에 공개됨 — 클릭해서 비공개로' : '사이트에 공개하기';
}

function buildProjectsJs(projects) {
  const items = projects.map(p => {
    const meta = p.meta.map(([k,v])=>`      ['${je(k)}','${je(v)}']`).join(',\n');
    const all  = p.allImages.map(img=>`      '${je(img)}'`).join(',\n');
    const desc = (p.description||'').normalize('NFC').replace(/`/g,'\\`').replace(/\${/g,'\\${');
    return `  {\n    id:'${je(p.id)}',\n    title:'${je(p.title)}',\n    category:'${je(p.category)}',\n    year:'${je(p.year)}',\n    description:\`${desc}\`,\n    meta:[\n${meta}\n    ],\n    gridImages:[\n      '${je(p.gridImage)}'\n    ],\n    allImages:[\n${all}\n    ]\n  }`;
  });
  return `const PROJECTS = [\n${items.join(',\n')}\n];`;
}

// ═══════════════════════════════════════════
//  Upcoming projects
// ═══════════════════════════════════════════
const U_KEY = 'meedorri-upcoming';
function loadUpcoming() { try { return JSON.parse(localStorage.getItem(U_KEY))||[]; } catch { return []; } }
function saveUpcoming(items) { localStorage.setItem(U_KEY, JSON.stringify(items)); }
function renderUpcoming() {
  const items = loadUpcoming();
  const list  = document.getElementById('upcoming-list');
  list.innerHTML = '';
  items.forEach((item,i) => {
    const row = document.createElement('div'); row.className='u-item'+(item.done?' done':'');
    const dot = document.createElement('div'); dot.className='u-dot';
    dot.onclick = () => { items[i].done=!items[i].done; saveUpcoming(items); renderUpcoming(); };
    const text = document.createElement('div'); text.className='u-text'; text.textContent=item.text;
    const del  = document.createElement('button'); del.className='u-del'; del.textContent='×';
    del.onclick = () => { items.splice(i,1); saveUpcoming(items); renderUpcoming(); };
    row.appendChild(dot); row.appendChild(text); row.appendChild(del);
    list.appendChild(row);
  });
}
function addUpcoming(text) {
  if (!text.trim()) return;
  const items = loadUpcoming(); items.push({text:text.trim(),done:false});
  saveUpcoming(items); renderUpcoming();
}

// ═══════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  renderUpcoming();
  const uInput = document.getElementById('u-input');
  document.getElementById('u-add-btn').onclick = () => { addUpcoming(uInput.value); uInput.value=''; };
  uInput.addEventListener('keydown', e => { if(e.key==='Enter'){addUpcoming(uInput.value);uInput.value='';} });

  document.getElementById('open-btn').onclick = async () => {
    if (!('showDirectoryPicker' in window)) { alert('Chrome 또는 Edge에서 사용해주세요.'); return; }
    try { await openFolder(await window.showDirectoryPicker({mode:'readwrite'})); }
    catch(e) { if(e.name!=='AbortError') alert(e.message); }
  };
});

window.addEventListener('load', async () => {
  const overlay = document.getElementById('init-overlay');
  const saved   = await loadHandle();

  const afterOpen = () => { overlay.style.display='none'; };

  if (saved) {
    try {
      const perm = await saved.queryPermission({mode:'readwrite'});
      if (perm==='granted') { await openFolder(saved); afterOpen(); return; }
    } catch {}
    // 새 세션 — 클릭 한 번으로 재연결
    overlay.addEventListener('click', async () => {
      try {
        if ((await saved.requestPermission({mode:'readwrite'}))==='granted') {
          afterOpen(); await openFolder(saved);
        }
      } catch(e) { if(e.name!=='AbortError') alert(e.message); }
    }, {once:true});
  } else {
    // 처음 방문 — 클릭 → 폴더 선택
    overlay.addEventListener('click', async () => {
      if (!('showDirectoryPicker' in window)) { alert('Chrome 또는 Edge에서 사용해주세요.'); return; }
      try {
        const h = await window.showDirectoryPicker({mode:'readwrite'});
        afterOpen(); await openFolder(h);
      } catch(e) { if(e.name!=='AbortError') alert(e.message); }
    }, {once:true});
  }
});

// ═══════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════
function proj() { return projects.find(x=>x.id===selectedId); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function je(s)  { return (s||'').normalize('NFC').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>
